<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Wysyłki Zaproszenia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      background: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
  </style>
</head>
<body>
  <h1>Test Wysyłki Zaproszenia</h1>

  <div class="form-group">
    <label>Email Admina:</label>
    <input type="email" id="adminEmail" value="s.hoffman@auraherbals.pl" />
  </div>

  <div class="form-group">
    <label>Hasło Admina:</label>
    <input type="password" id="adminPassword" placeholder="Wprowadź hasło" />
  </div>

  <button onclick="login()">Zaloguj się</button>

  <div id="loginResult"></div>

  <hr style="margin: 30px 0;">

  <div id="invitationForm" style="display: none;">
    <h2>Wyślij Zaproszenie</h2>

    <div class="form-group">
      <label>Email Odbiorcy:</label>
      <input type="email" id="recipientEmail" value="test-invitation@auraherbals.pl" />
    </div>

    <div class="form-group">
      <label>Rola:</label>
      <select id="role">
        <option value="specialist">Specjalista</option>
        <option value="manager">Kierownik</option>
        <option value="director">Dyrektor</option>
        <option value="ceo">Prezes</option>
      </select>
    </div>

    <button onclick="sendInvitation()">Wyślij Zaproszenie</button>

    <div id="invitationResult"></div>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://mzncjizbhvrqyyzclqxi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bmNqaXpiaHZycXl5emNscXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyOTU4NzgsImV4cCI6MjA4NTg3MTg3OH0.ytEULytrVrtmNFdc728DJWhh3bL1J6kQBen5DROeCCU';

    let accessToken = null;

    window.login = async function() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const resultDiv = document.getElementById('loginResult');

      if (!email || !password) {
        resultDiv.innerHTML = '<div class="result error">Wprowadź email i hasło</div>';
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          accessToken = data.access_token;
          resultDiv.innerHTML = '<div class="result success">Zalogowano pomyślnie!</div>';
          document.getElementById('invitationForm').style.display = 'block';
        } else {
          resultDiv.innerHTML = `<div class="result error">Błąd logowania: ${data.msg || data.error_description}</div>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">Błąd: ${error.message}</div>`;
      }
    };

    window.sendInvitation = async function() {
      const email = document.getElementById('recipientEmail').value;
      const role = document.getElementById('role').value;
      const resultDiv = document.getElementById('invitationResult');

      if (!email) {
        resultDiv.innerHTML = '<div class="result error">Wprowadź email odbiorcy</div>';
        return;
      }

      if (!accessToken) {
        resultDiv.innerHTML = '<div class="result error">Najpierw zaloguj się</div>';
        return;
      }

      try {
        resultDiv.innerHTML = '<div class="result info">Wysyłanie zaproszenia...</div>';

        const response = await fetch(`${SUPABASE_URL}/functions/v1/send-user-invitation`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'apikey': SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, role })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          resultDiv.innerHTML = `
            <div class="result success">
              <strong>Zaproszenie wysłane pomyślnie!</strong><br>
              <small>Link: ${data.invitation_link}</small>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `<div class="result error">Błąd: ${data.error}</div>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">Błąd: ${error.message}</div>`;
      }
    };
  </script>
</body>
</html>
